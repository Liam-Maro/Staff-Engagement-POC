name: Test Coverage

on:
  pull_request:
    branches: [main]

jobs:
  backend-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with coverage
        working-directory: backend
        run: mvn verify -B

      - name: Check coverage threshold (90%)
        working-directory: backend
        run: |
          echo "JaCoCo coverage check is enforced via jacoco-maven-plugin check goal."
          echo "Build will fail if line coverage < 90%."
          # The 'mvn verify' above already runs jacoco:check which fails the build
          # if coverage is below 90%. This step is informational.

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/target/site/jacoco/
